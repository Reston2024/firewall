# Log all kernel messages to the console.
# Logging much else clutters up the screen.
#kern.*							/dev/console

# Log anything (except mail) of level info or higher.
# Don't log private authentication messages!
# local0.* any dhcpcd log (even debug) in messages
cron.none;daemon.*;local0.*;local2.*;local5.*;*.info;mail.none;authpriv.*	-/var/log/messages

# Log crons
#cron.*										-/var/log/cron.log

# Everybody gets emergency messages
*.emerg										*

# Display logs on tty12
*.*												/dev/tty12

# Forward to Malcolm NSM rsyslog :514 on supportTAK-server (192.168.1.22).
# Previously pointed at 192.168.1.101 which was the old telemetry host
# decommissioned in Phase 10 (Malcolm migration, 2026-04-06). The live
# /etc/syslog.conf on IPFire was corrected in-place at migration time
# but this repo copy was not updated until the v2.0.1 audit on
# 2026-04-11. If you are doing a disaster-recovery rebuild, this is the
# authoritative target.
*.*										@192.168.1.22

# Postfix logs
mail.*										-/var/log/mail

# HAProxy
local1.*								-/var/log/haproxy
