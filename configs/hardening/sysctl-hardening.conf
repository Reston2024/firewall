# Phase 6 System Hardening — CIS Linux Level 1 adapted for IPFire router
# IMPORTANT: ip_forward MUST remain 1 — do NOT add ip_forward=0
# Deploy: cat this >> /etc/sysctl.conf && sysctl -p
#
# Verification (run on IPFire after deployment):
#   sysctl net.ipv4.conf.all.send_redirects         # must be 0
#   sysctl net.ipv4.conf.default.send_redirects     # must be 0
#   sysctl net.ipv4.conf.all.accept_source_route    # must be 0
#   sysctl net.ipv4.conf.default.accept_source_route # must be 0
#   sysctl net.ipv4.conf.all.accept_redirects       # must be 0
#   sysctl net.ipv4.conf.default.accept_redirects   # must be 0
#   sysctl net.ipv4.conf.all.rp_filter              # must be 1
#   sysctl net.ipv4.conf.default.rp_filter          # must be 1
#   sysctl net.ipv4.tcp_syncookies                  # must be 1
#   sysctl net.ipv6.conf.all.accept_redirects       # must be 0
#   sysctl net.ipv6.conf.default.accept_redirects   # must be 0

# Fix: send_redirects=1 observed on this system (D-07) — must be 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Already correct on this system but explicitly set for survivability:
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Additional CIS params safe for router:
net.ipv4.tcp_syncookies = 1
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
