# /etc/rsyslog.d/20-malcolm-forward.conf
# Deployed on: supportTAK-server (192.168.1.22)
# Forward all received syslog to Malcolm Filebeat syslog listener on localhost.
#
# Architecture note: IPFire sends syslog UDP to 192.168.1.22:514 where
# rsyslog receives it. rsyslog then forwards locally to 127.0.0.1:5514
# (Malcolm's Filebeat UDP ingest). The localhost forward allows us to
# restrict Filebeat :5514 to 127.0.0.1-only in the DOCKER-USER chain,
# preventing any other LAN host from injecting syslog into Malcolm via
# :5514 directly.
#
# Queue config (v2.0.1 hardening): disk-assisted LinkedList queue so
# pending messages survive rsyslog restart. Without saveOnShutdown the
# previous (v2.0) config would drop up to 10K buffered messages on any
# rsyslog service restart or reboot. With saveOnShutdown the queue is
# persisted to disk at /var/spool/rsyslog/malcolm-forward*.qi and
# drained on next start.
#
# Spool directory must exist and be writable by the syslog user; the
# deploy step creates it with appropriate ownership.

*.* action(type="omfwd"
           target="127.0.0.1"
           port="5514"
           protocol="udp"
           action.resumeRetryCount="3"
           queue.type="LinkedList"
           queue.size="10000"
           queue.saveOnShutdown="on"
           queue.filename="malcolm-forward"
           queue.maxDiskSpace="100m"
           queue.spoolDirectory="/var/spool/rsyslog")
