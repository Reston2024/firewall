# Auto-provisioned datasources — do not edit manually via Grafana UI
# These are loaded on Grafana startup from GF_PATHS_PROVISIONING

apiVersion: 1
datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 5000

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
