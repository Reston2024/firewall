# Logrotate config for IPFire syslog received via rsyslog
# Deploy to: /etc/logrotate.d/ipfire-syslog on supportTAK-server

/var/log/ipfire/syslog.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 syslog adm
    postrotate
        /usr/lib/rsyslog/rsyslog-rotate
    endscript
}
