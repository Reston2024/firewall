# rsyslog config for receiving IPFire syslog and writing to file for Alloy
# Deploy to: /etc/rsyslog.d/10-ipfire-remote.conf on supportTAK-server
# IPFire's BusyBox syslogd sends non-standard syslog (no RFC3164 header).
# rsyslog normalizes these messages and writes them with proper timestamps.

# Load UDP input module
module(load="imudp")
input(type="imudp" port="1514" ruleset="ipfire")

# Template: RFC3164-like format with timestamp, hostname, and message
template(name="ipfire_fmt" type="string"
  string="%timegenerated% %fromhost-ip% %syslogtag%%msg:::sp-if-no-1st-sp%%msg:::drop-last-lf%\n")

# Write all IPFire messages to dedicated log file
ruleset(name="ipfire") {
  action(type="omfile"
    file="/var/log/ipfire/syslog.log"
    template="ipfire_fmt"
    createDirs="on"
    dirCreateMode="0755"
    fileCreateMode="0644")
}
