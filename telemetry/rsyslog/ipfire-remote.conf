# Receive IPFire syslog on UDP 514 and write to file for Alloy
# Deploy to: /etc/rsyslog.d/10-ipfire-remote.conf on supportTAK-server
# IPFire BusyBox syslogd sends non-standard format. rsyslog normalizes it.
# IMPORTANT: /var/log/ipfire/ must be owned by syslog:adm (sudo chown syslog:adm /var/log/ipfire)
module(load="imudp")
input(type="imudp" port="514")

# Write all remote syslog from LAN to dedicated file for Alloy file-tailing
if $fromhost-ip startswith '192.168.1.' then {
  action(type="omfile" file="/var/log/ipfire/syslog.log"
    fileOwner="syslog" fileGroup="adm"
    createDirs="on" dirOwner="syslog" dirGroup="adm"
    dirCreateMode="0755" fileCreateMode="0644")
  stop
}
